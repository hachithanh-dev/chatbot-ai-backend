# ╔══════════════════════════════════════════════════════════════════╗
# ║  docker-compose.prod.yml — Production Override                   ║
# ║                                                                  ║
# ║  Kịch bản: TẤT CẢ chạy trong Docker containers.                ║
# ║  Monitoring trỏ container names qua Docker internal network.     ║
# ║  Database ports KHÔNG expose ra host (bảo mật production).       ║
# ║  Exporter ports KHÔNG expose ra host (chỉ Prometheus truy cập). ║
# ║                                                                  ║
# ║  Chạy:                                                           ║
# ║  docker compose -f docker-compose.yml \                          ║
# ║                 -f docker-compose.prod.yml up -d --remove-orphans║
# ║  Hoặc: run-prod.bat                                             ║
# ╚══════════════════════════════════════════════════════════════════╝

services:
  # ═══════════════════════════════════════════════════════════════════
  #  APPLICATION
  # ═══════════════════════════════════════════════════════════════════

  spring-ai:
    build: .
    container_name: spring-ai
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port 8080 chỉ expose nội bộ Docker network, KHÔNG ra internet
    # Nginx (frontend) truy cập qua shared-network → http://spring-ai:8080
    expose:
      - "8080"
    volumes:
      - ./models:/app/models:ro    # Mount E5 model files (read-only)
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Ho_Chi_Minh
      # ── API Keys ──────────────────────────────
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # ── Database (Docker DNS service names) ────
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # ── Redis (Docker DNS service name) ────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-thanhdeptrai}
      # ── Qdrant (Docker DNS service name) ───────
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      # ── Local Embedding Model (E5 via Docker volume) ─
      EMBEDDING_LOCAL_MODEL_PATH: /app/models/multilingual-e5-small/model_quantized.onnx
      EMBEDDING_LOCAL_TOKENIZER_PATH: /app/models/multilingual-e5-small/tokenizer.json
      # ── CORS ───────────────────────────────────
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:?Error - CORS_ALLOWED_ORIGINS must be set in .env}"
      # ── Cookie ─────────────────────────────────
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-true}
      # ── Admin Seeding ────────────────────────────
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    networks:
      - backend          # Network nội bộ: postgres, redis, qdrant
      - shared-network    # Network chia sẻ: Nginx frontend gọi vào đây
    restart: unless-stopped
    mem_limit: 1024m       # Tăng từ 768m → E5 model cần ~50MB RAM thêm
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s    # Tăng từ 60s → E5 model load cần thêm thời gian
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════════
  #  MONITORING STACK (targets = Docker DNS service names)
  # ═══════════════════════════════════════════════════════════════════

  # ── Prometheus ──────────────────────────────────────────────────────
  # Không depends_on spring-ai — Prometheus tự handle target down.
  # Nếu app chậm khởi động, Prometheus vẫn chạy để monitor infra.
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      redis-exporter:
        condition: service_started
      postgres-exporter:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.0.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis Exporter ──────────────────────────────────────────────────
  # Chỉ Prometheus truy cập qua Docker network — KHÔNG expose port ra host
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-thanhdeptrai}
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL Exporter ─────────────────────────────────────────────
  # Chỉ Prometheus truy cập qua Docker network — KHÔNG expose port ra host
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-chatbot}?sslmode=disable"
    networks:
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    shm_size: 128mb
    mem_limit: 768m
    cpus: 1.0
    command: >
      postgres
      -c timezone='Asia/Ho_Chi_Minh'
      -c log_timezone='Asia/Ho_Chi_Minh'
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c autovacuum_work_mem=32MB
      -c wal_buffers=8MB
      -c min_wal_size=80MB
      -c max_wal_size=512MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c max_connections=100
      -c jit=off
      -c log_min_duration_statement=250
      -c log_checkpoints=on
      -c log_lock_waits=on

  # ── Redis ───────────────────────────────────────────────────────────
  redis:
    mem_limit: 512m
    cpus: 0.5
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-thanhdeptrai}
      --appendonly yes 
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 384mb 
      --maxmemory-policy allkeys-lru
      --tcp-backlog 1024
      --timeout 300
      --tcp-keepalive 60
      --hz 50

  # ── Qdrant ──────────────────────────────────────────────────────────
  qdrant:
    mem_limit: 512m
    cpus: 1.0

networks:
  shared-network:
    external: true    # Tạo trước bằng: docker network create shared-network

volumes:
  prometheus_data:
  grafana_data:
