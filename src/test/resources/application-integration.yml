# Profile: integration — used by @SpringBootTest with Testcontainers
# Datasource, Redis URLs are auto-overridden by Testcontainers @DynamicPropertySource
spring:
  # ── HikariCP — must match LazyConnectionDataSourceProxy config ──────
  datasource:
    hikari:
      auto-commit: false   # CRITICAL: LazyConnectionDataSourceProxy assumes autoCommit=false

  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # ── Tắt Qdrant + AI auto-configuration (integration test không cần AI services) ──
  ai:
    google:
      genai:
        api-key: "mock-not-used"
        embedding:
          api-key: "mock-not-used"
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        collection-name: test-collection
        uses-tls: false
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

# ── Override Cohere API key — không cần env var khi test ──────────
cohere:
  api-key: "mock-not-used"

# ── Mock LLM — giả lập Gemini API ──────────────────────────────────
llm:
  mock:
    enabled: true

# ── Mock RAG — giả lập Embedding + Qdrant + Cohere Rerank ──────────
rag:
  mock:
    enabled: true

# ── CORS ──────────────────────────────────────────────────────────────
cors:
  allowed-origins: http://localhost:5173

# ── Cookie ────────────────────────────────────────────────────────────
app:
  cookie:
    secure: false

# ── Security — dùng test keys ──────────────────────────────────────
security:
  oauth2:
    google:
      client-id: "mock-google-client-id"
  jwt:
    public-key: classpath:keys/public.pem
    private-key: classpath:keys/private.pem

# ── Tắt Semantic Cache — không cần Jedis pool trên CI ──────────────
semantic-cache:
  enabled: false

# ── Tắt Memory — integration test không có Gemini + Qdrant ─────────
memory:
  enabled: false
