# ╔══════════════════════════════════════════════════════════════════╗
# ║           application.yaml — BASE / COMMON CONFIG               ║
# ║  Chứa cấu hình CHUNG cho mọi môi trường.                        ║
# ║  Không chứa secrets. Không chứa giá trị environment-specific.   ║
# ╚══════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: spring-ai

  # ── Virtual Threads (Java 21+) ─────────────────────────────────────
  threads:
    virtual:
      enabled: true

  # ── JMX — tắt trong container (đã có Prometheus/Grafana thay thế) ──
  jmx:
    enabled: false

  # ── Multipart Upload ───────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # ── JPA / Hibernate ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none                  # NEVER auto-create/drop schema
    show-sql: false
    open-in-view: false               # CRITICAL: avoid lazy-loading pitfalls
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 500
          order_inserts: true
          order_updates: true

  # ── Flyway ─────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── JDBC Template ──────────────────────────────────────────────────
  jdbc:
    template:
      fetch-size: 500

  # ── AI — Google Gemini ─────────────────────────────────────────────
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
        embedding:
          api-key: ${GEMINI_API_KEY}
        dimension: 768

    # ── Vector Store — Qdrant ────────────────────────────────────────
    vectorstore:
      qdrant:
        collection-name: spring
        use-tls: false
        initialize-schema: true

# ── Server ─────────────────────────────────────────────────────────────
server:
  shutdown: graceful
  tomcat:
    threads:
      max: 800          # Virtual Thread rất nhẹ — tăng cao được
      min-spare: 50
    connection-timeout: 60000   # 60s — Gemini đôi khi chậm
    keep-alive-timeout: 65000
    max-connections: 8192
    accept-count: 200
  compression:
    enabled: true
    mime-types: application/json,text/event-stream   # SSE streaming
    min-response-size: 512

# ── Local Embedding — multilingual-e5-small (ONNX) ───────────────────
# Dùng cho Semantic Cache + User Memory. 384-dim, 100+ languages.
# Dev: load từ classpath. Prod: override bằng env var đường dẫn Docker volume.
embedding:
  local:
    model-path: "classpath:models/multilingual-e5-small/model_quantized.onnx"
    tokenizer-path: "classpath:models/multilingual-e5-small/tokenizer.json"

# ── RAG Pipeline ─────────────────────────────────────────────────────────
rag:
  chunk-size: 2048
  chunk-overlap: 256
  collection-name: spring
  embedding-dimension: 768
  candidate-top-k: 10
  candidate-similarity-threshold: 0.6
  rerank-top-k: 3
  rerank-model: "rerank-v3.5"

# ── Long-Term Memory — User memories per user in Qdrant ──────────────
memory:
  enabled: true
  collection-name: user-memories
  embedding-dimension: 384          # ONNX multilingual-e5-small (giống semantic cache)
  similarity-threshold: 0.80        # E5 asymmetric + XLM-RoBERTa anisotropy → score cao hơn MiniLM
  top-k: 3                          # Top 3 memories liên quan nhất
  min-content-length: 5             # Skip "ok", "hi", "cảm ơn"
  duplicate-threshold: 0.98          # score >= 0.98 → skip (chỉ touch timestamp)
  update-threshold: 0.92             # score >= 0.92 → update content cùng ID

# ── Semantic Cache — Redis HNSW + Local Embedding ────────────────────
semantic-cache:
  enabled: true
  index-name: "idx:semantic_cache"
  key-prefix: "scache:"
  embedding-dimension: 384
  hnsw-m: 16
  hnsw-ef-construction: 200
  hnsw-ef-runtime: 10
  similarity-threshold: 0.88
  ttl-seconds: 86400          # 24 hours
  pool-max-total: 16
  pool-max-idle: 8
  pool-min-idle: 2
  pool-borrow-timeout-ms: 50  # Skip cache nếu pool busy

# ── Cohere ─────────────────────────────────────────────────────────────
cohere:
  api-key: ${COHERE_API_KEY}

# ── Redis Stream Consumer ───────────────────────────────────────────────
redis:
  stream:
    name: chat:messages
    consumer-group: chat-processor-group
    consumer-name: ${HOSTNAME:worker-1}
    dead-letter-stream: chat:messages:dlq
    batch-size: 200
    block-duration-ms: 500
    scheduler-interval-ms: 1000
    max-retry-attempts: 3
    concurrency: 3
    pending-check-interval-ms: 30000
    pending-idle-threshold-ms: 300000   # 5 minutes
    claim-min-idle-time-ms: 300000

# ── Scheduler ──────────────────────────────────────────────────────────
scheduler:
  pool-size: 5

# ── Session Activity Sync ──────────────────────────────────────────────
session:
  sync:
    interval-ms: 10000
    batch-size: 100
    user-sessions-ttl-hours: 24

# ── Rate Limiting ──────────────────────────────────────────────────────
rate-limit:
  # Layer 1 — Token Bucket (anti-spam, anti-crash)
  bucket-capacity: 5
  refill-rate-per-second: 1
  # Layer 2 — Daily Token Quota
  daily-token-limit: 200000

# ── Retry ──────────────────────────────────────────────────────────────
retry:
  initial-interval-ms: 1000
  multiplier: 2.0
  max-interval-ms: 60000

# ── Security ───────────────────────────────────────────────────────────
security:
  jwt:
    public-key: classpath:keys/public.pem
    private-key: classpath:keys/private.pem
    access-token-duration-seconds: 900       # 15 minutes
    refresh-token-duration-seconds: 604800   # 7 days
    issuer: spring-ai
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}

# ── Admin Seeding ──────────────────────────────────────────────────────
app:
  admin:
    emails: ${ADMIN_EMAILS:}   # Comma-separated, e.g. "admin@gmail.com,boss@gmail.com"

# ── Resilience4j ───────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      llm-gemini:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 20s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - java.lang.RuntimeException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - io.github.resilience4j.ratelimiter.RequestNotPermitted
          - io.github.resilience4j.bulkhead.BulkheadFullException
      # Redis CB — tuned cho fast detection (Redis operations phải sub-second)
      redis:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20               # 20 calls gần nhất — detect nhanh hơn
        minimum-number-of-calls: 10           # Bắt đầu evaluate sau 10 calls
        failure-rate-threshold: 60           # OPEN khi ≥60% failure (12/20 calls fail)
        slow-call-rate-threshold: 80          # OPEN khi ≥80% slow calls
        slow-call-duration-threshold: 500ms   # Redis >500ms = slow (bình thường <5ms)
        wait-duration-in-open-state: 30s      # Thử lại sau 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisCommandTimeoutException
          - org.springframework.dao.QueryTimeoutException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException

  # ── RateLimiter — Global RPM control cho Gemini API ──────────────────
  ratelimiter:
    instances:
      llm-gemini:
        limit-for-period: 90            # 90 RPM (headroom 10% từ 100 RPM)
        limit-refresh-period: 60s       # 1 period = 60 giây
        timeout-duration: 5s            # Chờ tối đa 5s nếu hết quota, sau đó reject
        register-health-indicator: true
        event-consumer-buffer-size: 100

  # ── Bulkhead — Concurrent call isolation ─────────────────────────────
  bulkhead:
    instances:
      llm-gemini:
        max-concurrent-calls: 15        # Tối đa 15 LLM streams đồng thời
        max-wait-duration: 3s           # Chờ tối đa 3s nếu bulkhead full
      db-fallback:
        max-concurrent-calls: 18        # HikariCP max (20) - 2 headroom cho operations thường
        max-wait-duration: 2s           # Chờ tối đa 2s cho DB permit khi Redis fail

# ── Actuator / Metrics ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers,ratelimiters,bulkheads,prometheus
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
    bulkheads:
      enabled: true
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: spring-ai
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

# ── Log Pattern (chung) ────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"